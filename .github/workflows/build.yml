name: Build NapCat Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NapCat Installer
        run: |
          xcodebuild -project NapCatInstaller.xcodeproj \
            -scheme NapCatInstaller \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          find build/DerivedData/Build/Products/ -name "*.app" -type d
          cp -R build/DerivedData/Build/Products/Release/NapCatInstaller.app ./
          ls -la NapCatInstaller.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: NapCatInstaller.app
          path: NapCatInstaller.app
          retention-days: 30

      - name: Create .dmg
        run: |
          mkdir -p build/dmg-root/.background
          cp -R NapCatInstaller.app build/dmg-root/
          ln -s /Applications build/dmg-root/Applications
          hdiutil create \
            -volname "NapCatInstaller" \
            -srcfolder build/dmg-root \
            -ov \
            -format UDZO \
            build/NapCatInstaller.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: NapCatInstaller.dmg
          path: build/NapCatInstaller.dmg
          retention-days: 30
